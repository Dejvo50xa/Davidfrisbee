<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Tagger · Czech Mixed</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif; }

  #top { position:sticky; top:0; z-index:100; background:#111; border-bottom:1px solid #222; padding:10px 14px; }
  #top h1 { font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#888; margin-bottom:8px; }

  #players { display:flex; flex-wrap:wrap; gap:6px; }
  .pbutton {
    display:flex; align-items:center; gap:6px;
    padding:5px 10px 5px 5px;
    border-radius:4px; border:1px solid #333; cursor:pointer;
    background:#1a1a1a; transition:all .15s; user-select:none;
  }
  .pbutton:hover { border-color:#555; }
  .pbutton.active { border-color:var(--c); background:color-mix(in srgb, var(--c) 18%, #000); }
  .pbutton .avatar {
    width:28px; height:28px; border-radius:3px; object-fit:cover; object-position:top;
    border:1px solid #333; flex-shrink:0;
  }
  .pbutton .label { font-size:11px; font-weight:500; white-space:nowrap; }
  .pbutton .count { font-size:10px; color:#666; margin-left:2px; }
  .pbutton.active .count { color:var(--c); }

  #toolbar { display:flex; align-items:center; gap:10px; margin-top:8px; flex-wrap:wrap; }
  #filter-btns { display:flex; gap:4px; }
  .fbtn { font-size:10px; letter-spacing:.1em; text-transform:uppercase; padding:4px 8px;
    background:#1a1a1a; border:1px solid #333; color:#666; border-radius:3px; cursor:pointer; }
  .fbtn.active { background:#333; color:#ccc; border-color:#555; }
  .fbtn.danger { }
  .fbtn.danger.active { background:rgba(255,80,80,.15); color:#f55; border-color:#f55; }
  #search { background:#1a1a1a; border:1px solid #333; border-radius:3px; padding:4px 8px;
    color:#ccc; font-size:11px; width:130px; }
  #export-btn { margin-left:auto; padding:6px 16px; background:#ffaa33; color:#000;
    border:none; border-radius:4px; font-size:11px; font-weight:700; cursor:pointer;
    letter-spacing:.1em; text-transform:uppercase; }
  #export-btn:hover { background:#ffc066; }
  #clear-btn { padding:5px 12px; background:transparent; color:#666;
    border:1px solid #333; border-radius:4px; font-size:11px; cursor:pointer; }
  #clear-btn:hover { color:#f55; border-color:#f55; }
  #status { font-size:10px; color:#666; letter-spacing:.05em; }

  #grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:3px; padding:10px; }

  .tile { position:relative; cursor:pointer; border-radius:3px; overflow:hidden;
    border:2px solid transparent; transition:border-color .1s, opacity .15s; aspect-ratio:2/3; background:#1a1a1a; }
  .tile img { width:100%; height:100%; object-fit:cover; object-position:top; display:block;
    transition:opacity .2s; }
  .tile:hover { border-color:#555; }
  .tile.tagged { border-color:var(--c); }
  .tile.tagged img { opacity:.75; }
  .tile.dimmed { opacity:.3; }
  .tile.hidden-tile { opacity:.4; border-color:#f5545444; }
  .tile.hidden-tile img { filter:grayscale(1); }

  .badge {
    position:absolute; top:4px; right:4px;
    padding:2px 5px; border-radius:2px;
    font-size:9px; font-weight:700; letter-spacing:.05em;
    background:var(--c); color:#000;
    pointer-events:none;
  }
  .fname {
    position:absolute; bottom:0; left:0; right:0;
    font-size:8px; color:rgba(255,255,255,.5); padding:2px 4px;
    background:rgba(0,0,0,.6); letter-spacing:.04em;
    pointer-events:none;
  }

  /* Delete button on tile */
  .del-btn {
    position:absolute; top:4px; left:4px;
    width:20px; height:20px; border-radius:3px;
    background:rgba(200,40,40,.85); border:none; color:#fff;
    font-size:13px; line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .15s;
    z-index:10;
  }
  .tile:hover .del-btn { opacity:1; }
  .del-btn:hover { background:rgba(255,60,60,1) !important; }

  /* Restore button for hidden tiles */
  .restore-btn {
    position:absolute; top:4px; left:4px;
    width:20px; height:20px; border-radius:3px;
    background:rgba(80,200,80,.85); border:none; color:#fff;
    font-size:13px; line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .15s;
    z-index:10;
  }
  .tile:hover .restore-btn { opacity:1; }
  .restore-btn:hover { background:rgba(100,220,100,1) !important; }

  /* Hidden badge */
  .hidden-badge {
    position:absolute; top:4px; right:4px;
    padding:2px 5px; border-radius:2px;
    font-size:9px; font-weight:700; letter-spacing:.05em;
    background:#f55; color:#fff;
    pointer-events:none;
  }

  /* Modal / export */
  #modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:200;
    align-items:center; justify-content:center; }
  #modal.open { display:flex; }
  #modal-inner { background:#111; border:1px solid #333; border-radius:8px;
    padding:24px; max-width:700px; width:95%; max-height:85vh; overflow:auto; }
  #modal-inner h2 { font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#888; margin-bottom:16px; }
  #modal-code { background:#0a0a0a; border:1px solid #222; border-radius:4px; padding:14px;
    font-family:'Menlo','Courier New',monospace; font-size:11px; line-height:1.6;
    white-space:pre; overflow-x:auto; color:#ccc; max-height:50vh; overflow-y:auto; }
  #copy-btn { margin-top:12px; padding:8px 20px; background:#6699ff; color:#000;
    border:none; border-radius:4px; font-size:11px; font-weight:700; cursor:pointer; letter-spacing:.1em; }
  #copy-btn:hover { background:#88aaff; }
  #close-btn { margin-top:12px; margin-left:10px; padding:7px 16px; background:transparent; color:#888;
    border:1px solid #333; border-radius:4px; font-size:11px; cursor:pointer; }
  #close-btn:hover { color:#fff; }
  #modal-note { margin-top:10px; font-size:10px; color:#666; line-height:1.6; }
  #hidden-summary { margin-top:14px; padding:10px 14px; background:#1a0a0a; border:1px solid #422;
    border-radius:4px; font-size:10px; color:#f99; line-height:1.8; }
  #hidden-summary strong { color:#f55; display:block; margin-bottom:4px; }
</style>
</head>
<body>

<div id="top">
  <h1>Photo Tagger &middot; Czech Mixed &middot; <span id="total-count">0</span> tagged &middot; <span id="hidden-count">0</span> hidden</h1>
  <div id="players"></div>
  <div id="toolbar">

    <input id="search" type="text" placeholder="Search filename…">
    <span id="status"></span>
    <button id="clear-btn" onclick="clearSelected()">Clear player tags</button>
    <button id="export-btn" onclick="openExport()">Export code →</button>
  </div>
</div>

<div id="grid"></div>

<div id="modal">

    </div>
    <div id="hidden-summary"></div>
    <div id="modal-note">
      Paste this into App.jsx, replacing the existing <code>const PLAYERS = [...];</code> block.<br>
      Then run <code>bash ~/Desktop/push_mix.sh</code> to deploy.
    </div>
  </div>
</div>

  try {
    const saved = localStorage.getItem(STORE_KEY);
    if (saved) { assignments = JSON.parse(saved); }
    else {
      assignments = {};
      Object.entries(DEFAULT).forEach(([name, photos]) => {
        photos.forEach(p => { assignments[p] = name; });
      });
      save();
    }
  } catch(e) {}
  try {
    const savedH = localStorage.getItem(HIDDEN_KEY);
    if (savedH) { hidden = new Set(JSON.parse(savedH)); }
  } catch(e) {}
}

function save() { localStorage.setItem(STORE_KEY, JSON.stringify(assignments)); }
function saveHidden() { localStorage.setItem(HIDDEN_KEY, JSON.stringify([...hidden])); }

function getPlayer(name) { return PLAYERS.find(p => p.name === name); }
function playerColor(name) { const p = getPlayer(name); return p ? p.color : '#fff'; }

// ── Render players bar ──
function renderPlayers() {
  const bar = document.getElementById('players');
  bar.innerHTML = '';
  PLAYERS.forEach(p => {
    const count = Object.values(assignments).filter(v => v === p.name).length;
    const btn = document.createElement('div');
    btn.className = 'pbutton' + (selectedPlayer === p.name ? ' active' : '');
    btn.style.setProperty('--c', p.color);
    btn.innerHTML = `<img class="avatar" src="${p.photo}" onerror="this.style.background='#333';this.style.display='none'">
      <span class="label">${p.name.split(' ')[0]}</span>
      <span class="count">${count}</span>`;
    btn.addEventListener('click', () => {
      selectedPlayer = selectedPlayer === p.name ? null : p.name;
      renderPlayers();
      renderStatus();
      updateGridDim();
    });
    bar.appendChild(btn);
  });
  document.getElementById('total-count').textContent = Object.keys(assignments).length;
  document.getElementById('hidden-count').textContent = hidden.size;
}

// ── Render photo grid ──
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const visPhotos = ALL_PHOTOS.filter(f => {
    if (searchQ && !f.toLowerCase().includes(searchQ)) return false;
    if (filter === 'tagged')   return assignments[f] && !hidden.has(f);
    if (filter === 'untagged') return !assignments[f] && !hidden.has(f);
    if (filter === 'hidden')   return hidden.has(f);
    // 'all' — show everything except hidden
    return !hidden.has(f);
  });
  document.getElementById('status').textContent = `${visPhotos.length} photos`;

  visPhotos.forEach(file => {
    const isHidden = hidden.has(file);
    const owner = assignments[file];
    const p = owner ? getPlayer(owner) : null;

    const tile = document.createElement('div');
    tile.className = 'tile' + (owner && !isHidden ? ' tagged' : '') + (isHidden ? ' hidden-tile' : '');
    tile.dataset.file = file;
    if (p && !isHidden) tile.style.setProperty('--c', p.color);

    if (isHidden) {
      // Restore button
      const rb = document.createElement('button');
      rb.className = 'restore-btn'; rb.title = 'Restore'; rb.textContent = '↩';
      rb.addEventListener('click', e => { e.stopPropagation(); restorePhoto(file, tile); });
      tile.innerHTML = `<img src="${file}" loading="lazy" onerror="this.parentElement.style.opacity='.2'">
        <div class="hidden-badge">✕</div>
        <div class="fname">${file.replace('_MG_','').replace('.jpg','')}</div>`;
      tile.appendChild(rb);
    } else {
      // Delete button
      const db = document.createElement('button');
      db.className = 'del-btn'; db.title = 'Hide photo'; db.textContent = '✕';
      db.addEventListener('click', e => { e.stopPropagation(); hidePhoto(file, tile); });

      tile.innerHTML = `<img src="${file}" loading="lazy" onerror="this.parentElement.style.opacity='.3'">
        ${p ? `<div class="badge">${p.initials}</div>` : ''}
        <div class="fname">${file.replace('_MG_','').replace('.jpg','')}</div>`;
      tile.appendChild(db);
      tile.addEventListener('click', () => toggleTag(file, tile));
    }

    grid.appendChild(tile);
  });
  updateGridDim();
}

function hidePhoto(file, tile) {
  // Remove any player tag
  delete assignments[file];
  hidden.add(file);
  save(); saveHidden();
  // Remove from grid (unless we're in hidden filter)
  if (filter !== 'hidden') {
    tile.remove();
  } else {
    renderGrid();
  }
  renderPlayers();
}

function restorePhoto(file, tile) {
  hidden.delete(file);
  saveHidden();
  renderGrid();
  renderPlayers();
}

function toggleTag(file, tile) {
  if (!selectedPlayer) { alert('Select a player first (click their name above)'); return; }
  if (assignments[file] === selectedPlayer) {
    delete assignments[file];
  } else {
    assignments[file] = selectedPlayer;
  }
  save();
  // Update tile in place
  const owner = assignments[file];
  const p = owner ? getPlayer(owner) : null;
  tile.className = 'tile' + (owner ? ' tagged' : '');
  tile.style.setProperty('--c', p ? p.color : 'transparent');
  tile.querySelector('.badge')?.remove();
  tile.querySelector('.fname')?.remove();
  tile.querySelector('.del-btn')?.remove();
  if (p) {
    const b = document.createElement('div'); b.className = 'badge'; b.textContent = p.initials; tile.appendChild(b);
  }
  const fn = document.createElement('div'); fn.className = 'fname'; fn.textContent = file.replace('_MG_','').replace('.jpg',''); tile.appendChild(fn);
  const db = document.createElement('button');
  db.className = 'del-btn'; db.title = 'Hide photo'; db.textContent = '✕';
  db.addEventListener('click', e => { e.stopPropagation(); hidePhoto(file, tile); });
  tile.appendChild(db);
  updateGridDim();
  renderPlayers();
}

function updateGridDim() {
  document.querySelectorAll('.tile').forEach(tile => {
    const owner = assignments[tile.dataset.file];
    if (!selectedPlayer) { tile.classList.remove('dimmed'); return; }
    tile.classList.toggle('dimmed', owner && owner !== selectedPlayer);
  });
}

function clearSelected() {
  if (!selectedPlayer) { alert('Select a player first'); return; }
  if (!confirm(`Remove all tags for ${selectedPlayer}?`)) return;
  Object.keys(assignments).forEach(f => { if (assignments[f] === selectedPlayer) delete assignments[f]; });
  save();
  renderGrid();
  renderPlayers();
}

// ── Export ──
function openExport() {
  const byPlayer = {};
  PLAYERS.forEach(p => { byPlayer[p.name] = [p.photo]; });
  Object.entries(assignments).forEach(([file, name]) => {
    if (!byPlayer[name]) return;
    if (!hidden.has(file) && !byPlayer[name].includes(file)) byPlayer[name].push(file);
  });

  const lines = PLAYERS.map(p => {
    const photos = byPlayer[p.name] || [p.photo];
    const pArr = JSON.stringify(photos).replace(/,/g,', ');
    return `  { name:"${p.name}", initials:"${p.initials}", photo:"${p.photo}", feelings:"",\n    photos:${pArr} }`;
  });
  const code = `const PLAYERS = [\n${lines.join(',\n')},\n];`;
  document.getElementById('modal-code').textContent = code;

  // Show hidden photos summary
  const hiddenEl = document.getElementById('hidden-summary');
  if (hidden.size > 0) {
    const list = [...hidden].map(f => f.replace('_MG_','').replace('.jpg','')).join(', ');
    hiddenEl.innerHTML = `<strong>⚠ ${hidden.size} photos marked hidden</strong>
These won't appear in player galleries. To also remove them from the main gallery in App.jsx,
search for each filename in <code>ALL_PHOTOS</code> and delete those lines:<br><br>
<code>${[...hidden].join(', ')}</code>`;
    hiddenEl.style.display = 'block';
  } else {
    hiddenEl.style.display = 'none';
  }

  document.getElementById('modal').classList.add('open');
}

function closeExport() { document.getElementById('modal').classList.remove('open'); }

function copyCode() {
  const text = document.getElementById('modal-code').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied!'; btn.style.background = '#6bcb77';
    setTimeout(() => { btn.textContent = 'Copy to clipboard'; btn.style.background = '#6699ff'; }, 2000);
  });
}

function renderStatus() {
  const s = selectedPlayer ? `✏ Tagging: ${selectedPlayer}` : 'No player selected';
  document.getElementById('status').textContent = s;
}

// ── Filter buttons ──
document.querySelectorAll('.fbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    filter = btn.dataset.filter;
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.trim().toLowerCase();
  renderGrid();
});

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeExport();
});

// ── Init ──
load();
renderPlayers();
renderGrid();
renderStatus();
</script>
</body>
</html>
